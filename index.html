<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بقولك اي</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    overflow:hidden;
    text-align:center;
    transition:1s ease;
}

h1{
    font-size:50px;
}

button{
    margin-top:20px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#final{
    position:absolute;
    font-size:38px;
    opacity:0;
}

.line{
    opacity:0;
    margin:15px 0;
    transition:0.6s;
}

@keyframes pop {
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.celebrate{
    background:linear-gradient(45deg,#ff512f,#dd2476,#ff9966);
    animation: pop 0.6s ease;
}
</style>
</head>

<body>

<div id="content">
    <h1>بقولك اي 🫵🏻</h1>
    <button onclick="boom()">اي 🤔</button>
</div>

<div id="final">
    <div class="line" id="l1">😉 خدتك عـ...</div>
    <div class="line" id="l2">...احم</div>
    <div class="line" id="l3">😂❤️ كل سنة وانت طيب يسطا</div>
</div>

<script>
function boom(){
    document.getElementById("content").style.display = "none";
    let final = document.getElementById("final");
    final.style.opacity = "1";

    setTimeout(()=>{document.getElementById("l1").style.opacity="1";},500);
    setTimeout(()=>{document.getElementById("l2").style.opacity="1";},1500);
    setTimeout(()=>{document.getElementById("l3").style.opacity="1";},2500);

    setTimeout(()=>{
        document.body.classList.add("celebrate");
    },3000);
}
</script>

</body>
</html>
